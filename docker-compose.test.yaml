# Postgres instance for integration/concurrency tests.
#
# Usage:
#   docker compose -f docker-compose.test.yaml up -d
#   JITAUTH_TEST_DATABASE_URL="postgresql://jitauth_test:testpass@localhost:5433/jitauth_test" \
#     python -m pytest tests/ -m postgres -v
#   docker compose -f docker-compose.test.yaml down -v
#
# Or use the Makefile:
#   make test-postgres

services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jitauth_test
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: jitauth_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jitauth_test"]
      interval: 2s
      timeout: 2s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data  # RAM-backed for speed
